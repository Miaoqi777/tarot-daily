<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 运势分析 — 每周/月/季/年运势回顾</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Weather Bar -->
  <div class="weather-bar" id="weather-bar">
    <span class="weather-icon" id="weather-icon">🌤️</span>
    <span class="weather-temp" id="weather-temp">--°C</span>
    <span class="weather-desc" id="weather-desc">加载中...</span>
    <span class="weather-city" id="weather-city">📍 定位中...</span>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-pin-btn" id="sidebar-pin" title="固定侧边栏">📌</div>
    <div class="sidebar-handle"></div>
    <nav class="sidebar-nav">
      <button class="sidebar-item" onclick="window.location.href='index.html'">
        <span class="sidebar-icon">🔮</span>
        <span class="sidebar-label">每日占卜</span>
      </button>
      <button class="sidebar-item" onclick="window.location.href='encyclopedia.html'">
        <span class="sidebar-icon">📖</span>
        <span class="sidebar-label">塔罗百科</span>
      </button>
      <button class="sidebar-item active">
        <span class="sidebar-icon">📊</span>
        <span class="sidebar-label">运势分析</span>
      </button>
      <div class="sidebar-divider"></div>
      <button class="sidebar-item" onclick="openMoodFromSidebar()">
        <span class="sidebar-icon">💝</span>
        <span class="sidebar-label">今日心情</span>
      </button>
      <button class="sidebar-item" id="sidebar-noise-btn" onclick="toggleWhiteNoise()">
        <span class="sidebar-icon">🎵</span>
        <span class="sidebar-label">白噪音</span>
      </button>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-user-avatar">👤</div>
      <span id="sidebar-username">未登录</span>
    </div>
    <button class="sidebar-item" id="sidebar-auth-btn" onclick="handleSidebarAuth()">
      <span class="sidebar-icon">🔑</span>
      <span class="sidebar-label" id="sidebar-auth-label">登录 / 注册</span>
    </button>
  </aside>

  <!-- Main Content -->
  <main class="history-page">
    <div class="history-header">
      <h1 class="section-title">📊 运势<span style="color:var(--accent-dark);">分析</span></h1>
      <p class="section-subtitle" id="history-subtitle">登录后可查看你的运势回顾</p>
    </div>

    <!-- Period Tabs -->
    <div class="period-tabs" id="period-tabs">
      <button class="period-tab active" data-period="weekly" onclick="switchPeriod('weekly', this)">📅 本周</button>
      <button class="period-tab" data-period="monthly" onclick="switchPeriod('monthly', this)">🗓️ 本月</button>
      <button class="period-tab" data-period="quarterly" onclick="switchPeriod('quarterly', this)">📆 本季</button>
      <button class="period-tab" data-period="yearly" onclick="switchPeriod('yearly', this)">📋 全年</button>
    </div>

    <!-- Analysis Stats -->
    <div class="analysis-grid" id="analysis-stats">
      <!-- Filled dynamically -->
    </div>

    <!-- Mood Calendar -->
    <h3 style="margin-bottom:12px;">💝 心情日历</h3>
    <div class="mood-calendar" id="mood-calendar">
      <!-- Filled dynamically -->
    </div>

    <!-- Fortune History -->
    <h3 style="margin:30px 0 12px;">📜 占卜记录</h3>
    <div class="history-records" id="history-records">
      <!-- Filled dynamically -->
    </div>

    <!-- Export -->
    <button class="btn-action secondary export-btn" id="export-btn" onclick="handleExport()" style="display:none;">
      💾 导出全部数据 (JSON)
    </button>

    <!-- Login prompt -->
    <div class="text-center mt-20" id="login-prompt" style="padding:40px;">
      <p style="color:var(--text-muted);margin-bottom:16px;">🔒 登录后查看运势分析与历史记录</p>
      <button class="btn-action primary" onclick="showAuthModal()">🔑 去登录</button>
    </div>
  </main>

  <!-- Auth Modal -->
  <div class="auth-overlay hidden" id="auth-overlay">
    <div class="auth-card glass-strong">
      <button class="auth-close" onclick="hideAuthModal()">✕</button>
      <div class="auth-card-logo">🔮</div>
      <div class="auth-card-title">欢迎来到 <span style="color:var(--accent-dark);">每日塔罗</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login-btn">🔑 登录</button>
        <button class="auth-tab" data-tab="register" id="tab-register-btn">📝 注册</button>
      </div>
      <form class="auth-form active" data-tab="login" id="login-form">
        <div class="auth-field"><label>用户名</label><input type="text" id="login-username" placeholder="输入用户名" required></div>
        <div class="auth-field"><label>密码</label><div class="pw-field"><input type="password" id="login-password" placeholder="输入密码" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">👁️</button></div></div>
        <div class="auth-error" id="login-error"></div>
        <button type="submit" class="auth-submit">登录</button>
      </form>
      <form class="auth-form" data-tab="register" id="register-form">
        <div class="auth-field"><label>用户名</label><input type="text" id="register-username" placeholder="2-20个字符" required></div>
        <div class="auth-field"><label>密码</label><div class="pw-field"><input type="password" id="register-password" placeholder="至少6位" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">👁️</button></div></div>
        <div class="auth-field"><label>确认密码</label><div class="pw-field"><input type="password" id="register-password-confirm" placeholder="再次输入密码" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">👁️</button></div></div>
        <div class="auth-error" id="register-error"></div>
        <button type="submit" class="auth-submit">注册</button>
      </form>
      <p class="auth-hint">🔒 数据仅保存在你的浏览器中</p>
    </div>
  </div>

  <!-- White Noise Panel -->
  <div class="white-noise-panel" id="white-noise-panel">
    <button class="wn-toggle glass" id="wn-toggle" onclick="toggleWhiteNoise()">🎵</button>
    <div class="wn-expanded glass" id="wn-expanded">
      <button class="wn-option active" data-sound="rain" onclick="selectNoiseSound('rain',this)">🌧️ 雨声</button>
      <button class="wn-option" data-sound="wind" onclick="selectNoiseSound('wind',this)">🍃 风声</button>
      <button class="wn-option" data-sound="ocean" onclick="selectNoiseSound('ocean',this)">🌊 海浪</button>
      <button class="wn-option" data-sound="forest" onclick="selectNoiseSound('forest',this)">🌴 雨林</button>
      <div class="wn-volume"><span>🔈</span><input type="range" id="wn-volume" min="0" max="100" value="40" oninput="setNoiseVolume(this.value)"><span>🔊</span></div>
    </div>
  </div>

  <!-- Emoji Float -->
  <div class="emoji-float-container" id="emoji-container"></div>

  <script src="js/auth.js"></script>
  <script src="js/white-noise.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/history.js"></script>
</body>
</html>

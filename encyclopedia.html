<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡牌索引 · CARD INDEX</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>[?]</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Weather Bar -->
  <div class="weather-bar" id="weather-bar">
    <span class="weather-icon" id="weather-icon">--</span>
    <span class="weather-temp" id="weather-temp">--°C</span>
    <span class="weather-desc" id="weather-desc">加载中...</span>
    <span class="weather-city" id="weather-city">[ 定位中... ]</span>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-pin-btn" id="sidebar-pin" title="固定侧边栏"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg></div>
    <div class="sidebar-handle"></div>
    <nav class="sidebar-nav">
      <button class="sidebar-item" onclick="window.location.href='index.html'">
        <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><rect x="12" y="2" width="14" height="14" transform="rotate(45 12 2)"/></svg></span>
        <span class="sidebar-label">ORACLE</span>
      </button>
      <button class="sidebar-item active">
        <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a3.5 3.5 0 015.5 2.5c0 2-2 2.5-2 4"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/></svg></span>
        <span class="sidebar-label">ARCHIVE</span>
      </button>
      <button class="sidebar-item" onclick="window.location.href='history.html'">
        <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></span>
        <span class="sidebar-label">ANALYTICS</span>
      </button>
      <div class="sidebar-divider"></div>
      <button class="sidebar-item" onclick="openMoodFromSidebar()">
        <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><path d="M12 20S3 13.5 3 8a5 5 0 019-3 5 5 0 019 3c0 5.5-9 12-9 12z"/></svg></span>
        <span class="sidebar-label">STATE</span>
      </button>
      <button class="sidebar-item" id="sidebar-noise-btn" onclick="toggleWhiteNoise()">
        <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><circle cx="7" cy="17" r="2.5"/><line x1="9.5" y1="17" x2="20" y2="8"/><line x1="9.5" y1="12" x2="20" y2="3"/><circle cx="17.5" cy="5.5" r="1.5"/></svg></span>
        <span class="sidebar-label">AMBIENT</span>
      </button>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-user-avatar">?</div>
      <span id="sidebar-username">未登录</span>
    </div>
    <button class="sidebar-item" id="sidebar-auth-btn" onclick="handleSidebarAuth()">
      <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.5 3.5-8 8-8s8 3.5 8 8"/></svg></span>
      <span class="sidebar-label" id="sidebar-auth-label">AUTH</span>
    </button>
    <button class="sidebar-item" id="sidebar-export-btn" onclick="handleSidebarExport()" style="display:none;">
      <span class="sidebar-icon"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11, 12 5, 18 11"/></svg></span>
      <span class="sidebar-label">EXPORT</span>
    </button>
  </aside>

  <!-- Main Content -->
  <main class="encyclopedia-page">
    <div class="encyclopedia-header">
      <h1 class="section-title">CARD.INDEX · <span style="color:var(--amber-400);">卡牌索引</span></h1>
      <p class="section-subtitle">78张标准韦特塔罗数据档案</p>
    </div>

    <!-- Search -->
    <input type="text" class="encyclopedia-search glass" id="encyclo-search"
           placeholder="SEARCH 搜索牌名、关键词..." oninput="filterAndRender()">

    <!-- Filters -->
    <div class="encyclopedia-filters" id="encyclo-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">[ALL]</button>
      <button class="filter-btn" data-filter="major" onclick="setFilter('major', this)">[MAJOR]</button>
      <button class="filter-btn" data-filter="minor" onclick="setFilter('minor', this)">[MINOR]</button>
      <button class="filter-btn" data-filter="wands" onclick="setFilter('wands', this)">[WANDS]</button>
      <button class="filter-btn" data-filter="cups" onclick="setFilter('cups', this)">[CUPS]</button>
      <button class="filter-btn" data-filter="swords" onclick="setFilter('swords', this)">[SWORDS]</button>
      <button class="filter-btn" data-filter="pentacles" onclick="setFilter('pentacles', this)">[PENTACLES]</button>
    </div>

    <!-- Card Grid -->
    <div class="encyclopedia-grid" id="encyclo-grid">
      <p style="text-align:center;color:var(--text-muted);grid-column:1/-1;">加载中...</p>
    </div>
  </main>

  <!-- Card Detail Modal -->
  <div class="card-detail-overlay hidden" id="card-detail-overlay">
    <div class="card-detail glass-strong" id="card-detail"></div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-overlay hidden" id="auth-overlay">
    <div class="auth-card glass-strong">
      <button class="auth-close" onclick="hideAuthModal()"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      <div class="auth-card-logo">◆</div>
      <div class="auth-card-title">SYS.AUTH · <span style="color:var(--amber-400);">身份验证</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login-btn">[LOGIN]</button>
        <button class="auth-tab" data-tab="register" id="tab-register-btn">[REGISTER]</button>
      </div>
      <form class="auth-form active" data-tab="login" id="login-form">
        <div class="auth-field"><label>USERNAME:</label><input type="text" id="login-username" placeholder="输入用户名" required></div>
        <div class="auth-field"><label>PASSWORD:</label><div class="pw-field"><input type="password" id="login-password" placeholder="输入密码" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">⊙</button></div>
        <div class="auth-error" id="login-error"></div>
        <button type="submit" class="auth-submit">◆ 登录</button>
      </form>
      <form class="auth-form" data-tab="register" id="register-form">
        <div class="auth-field"><label>USERNAME:</label><input type="text" id="register-username" placeholder="2-20个字符" required></div>
        <div class="auth-field"><label>PASSWORD:</label><div class="pw-field"><input type="password" id="register-password" placeholder="至少6位" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">⊙</button></div>
        <div class="auth-field"><label>CONFIRM:</label><div class="pw-field"><input type="password" id="register-password-confirm" placeholder="再次输入密码" required><button type="button" class="pw-eye" onclick="togglePw(this)" tabindex="-1">⊙</button></div></div>
        <div class="auth-error" id="register-error"></div>
        <button type="submit" class="auth-submit">◆ 注册</button>
      </form>
      <p class="auth-hint">[SYNC] 账号数据通过 Supabase 云端同步，全设备通用</p>
      <p class="auth-hint" style="margin-top:4px;font-size:0.7rem;">
        <a href="#" onclick="triggerAccountImport();return false;" style="color:var(--amber-400);text-decoration:underline;">[<] 从其他设备导入账号</a>
      </p>
    </div>
  </div>

  <!-- White Noise Panel -->
  <div class="white-noise-panel" id="white-noise-panel">
    <button class="wn-toggle glass" id="wn-toggle" onclick="toggleWhiteNoise()"><svg class="svg-icon svg-glow" viewBox="0 0 24 24"><circle cx="7" cy="17" r="2.5"/><line x1="9.5" y1="17" x2="20" y2="8"/><line x1="9.5" y1="12" x2="20" y2="3"/><circle cx="17.5" cy="5.5" r="1.5"/></svg></button>
    <div class="wn-expanded glass" id="wn-expanded">
      <button class="wn-option active" data-sound="rain" onclick="selectNoiseSound('rain',this)">rain.wav</button>
      <button class="wn-option" data-sound="wind" onclick="selectNoiseSound('wind',this)">wind.wav</button>
      <button class="wn-option" data-sound="ocean" onclick="selectNoiseSound('ocean',this)">ocean.wav</button>
      <button class="wn-option" data-sound="forest" onclick="selectNoiseSound('forest',this)">forest.wav</button>
      <div class="wn-volume"><span>[-]</span><input type="range" id="wn-volume" min="0" max="100" value="40" oninput="setNoiseVolume(this.value)"><span>[+]</span></div>
    </div>
  </div>

  <!-- Hidden File Input -->
  <input type="file" id="account-import-file" accept=".json" style="display:none" onchange="handleImportFile(this)">

  <!-- Emoji Float -->
  <div class="emoji-float-container" id="emoji-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/white-noise.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/encyclopedia.js"></script>
</body>
</html>
